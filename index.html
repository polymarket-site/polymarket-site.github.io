<body>
  <header class="topbar">
    <div class="brand" aria-label="Polymarket">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Polymarket</span>
    </div>
    <nav class="nav" aria-label="Trusted references">

  <main class="stage">
    <section class="hero" aria-label="Polymarket overview">
      <h1>Polymarket</h1>
      <p class="sub"><strong>Polymarket</strong> is a prediction market where you trade on real-world event outcomes from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Prediction market preview">
      <div class="question">Will the event happen?</div>
      <div class="outcomes" role="group" aria-label="Choose an outcome">
        <button class="outcome is-selected" type="button" aria-pressed="true">Yes</button>
        <button class="outcome" type="button" aria-pressed="false">No</button>
      </div>
      <div class="asset-chip">
        <img src="usdc.png" alt="USDC">
        <span>Trade with USDC</span>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Polymarket &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var buttons = document.querySelectorAll(".outcome");
    buttons.forEach(function(button){
      button.addEventListener("click", function(){
        buttons.forEach(function(item){
          var active = item === button;
          item.classList.toggle("is-selected", active);
          item.setAttribute("aria-pressed", active ? "true" : "false");
        });
      });
    });
  })();
  </script>
