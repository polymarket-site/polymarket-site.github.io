<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polymarket - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Polymarket DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://polymarket-site.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --surface-soft:#F1F4F8;
  --ink:#101318;
  --muted:#5D6774;
  --faint:#8C96A3;
  --line:rgba(16,19,24,.10);
  --line-strong:rgba(16,19,24,.16);
  --accent:#2D6BF8;
  --accent-soft:rgba(45,107,248,.10);
  --accent-hover:#205ADF;
  --shadow:0 28px 70px -36px rgba(16,19,24,.34);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  background:
    radial-gradient(55% 42% at 50% -10%, rgba(45,107,248,.12), transparent 64%),
    linear-gradient(180deg, #FFFFFF 0%, var(--bg) 58%, #F3F5F8 100%);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
p,h1{margin:0}

.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  min-height:68px;
  padding:16px clamp(18px,4vw,44px);
}

.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  font-weight:760;
  letter-spacing:0;
  font-size:1.02rem;
}

.brand img{
  width:28px;
  height:28px;
  border-radius:8px;
  box-shadow:0 0 0 1px var(--line);
  flex:none;
}

.nav{
  display:flex;
  align-items:center;
  gap:26px;
  margin-left:10px;
}

.nav a{
  color:var(--muted);
  font-size:.93rem;
  font-weight:560;
  transition:color .16s ease;
}

.nav a:hover{color:var(--ink)}
.spacer{flex:1}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:8px 17px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  color:var(--ink);
  background:rgba(255,255,255,.72);
  font-size:.92rem;
  font-weight:700;
  box-shadow:0 10px 30px -24px rgba(16,19,24,.4);
  transition:border-color .16s ease, transform .16s ease, background .16s ease;
}

.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(45,107,248,.38);
  background:#FFFFFF;
}

.stage{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:28px;
  padding:10px clamp(18px,4vw,44px) 16px;
}

.hero{
  width:min(680px,100%);
  text-align:center;
}

h1{
  font-size:clamp(3rem,6vw,4.8rem);
  line-height:1.02;
  letter-spacing:0;
  font-weight:820;
}

.sub{
  max-width:58ch;
  margin:16px auto 0;
  color:var(--muted);
  font-size:clamp(1rem,1.65vw,1.16rem);
}

.sub strong{
  color:var(--ink);
  font-weight:760;
}

.app-card{
  width:min(430px,100%);
  border:1px solid var(--line);
  border-radius:20px;
  background:rgba(255,255,255,.92);
  box-shadow:var(--shadow);
  padding:20px;
}

.question{
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line);
  border-radius:14px;
  background:linear-gradient(180deg,#FFFFFF 0%,#F8FAFC 100%);
  color:var(--ink);
  font-size:1.04rem;
  font-weight:760;
  text-align:center;
}

.outcomes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}

.outcome{
  min-height:48px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--surface-soft);
  color:var(--muted);
  font:inherit;
  font-size:1rem;
  font-weight:780;
  cursor:pointer;
  transition:background .16s ease, color .16s ease, border-color .16s ease, transform .16s ease;
}

.outcome:hover{
  transform:translateY(-1px);
  border-color:rgba(45,107,248,.34);
}

.outcome.is-selected{
  background:var(--accent);
  border-color:var(--accent);
  color:#FFFFFF;
}

.asset-chip{
  min-height:46px;
  margin-top:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#FFFFFF;
  color:var(--muted);
  font-size:.93rem;
  font-weight:700;
}

.asset-chip img{
  width:24px;
  height:24px;
  border-radius:50%;
  flex:none;
}

.primary{
  min-height:54px;
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:15px;
  background:var(--accent);
  color:#FFFFFF;
  font-size:1.04rem;
  font-weight:820;
  box-shadow:0 18px 36px -24px rgba(45,107,248,.9);
  transition:background .16s ease, transform .16s ease, box-shadow .16s ease;
}

.primary:hover{
  transform:translateY(-1px);
  background:var(--accent-hover);
  box-shadow:0 22px 42px -24px rgba(45,107,248,1);
}

.foot{
  flex:0 0 auto;
  padding:14px 24px 22px;
  color:var(--faint);
  text-align:center;
  font-size:.86rem;
  font-weight:650;
}

@media(max-width:620px){
  .topbar{
    min-height:62px;
    gap:12px;
    padding:14px 16px;
  }

  .nav{display:none}

  .brand{
    font-size:.98rem;
    gap:9px;
  }

  .brand img{
    width:26px;
    height:26px;
  }

  .ghost{
    min-height:36px;
    padding:7px 13px;
    font-size:.88rem;
  }

  .stage{
    justify-content:center;
    gap:22px;
    padding:6px 16px 12px;
  }

  h1{font-size:2.84rem}

  .sub{
    margin-top:12px;
    max-width:31ch;
    font-size:1rem;
    line-height:1.48;
  }

  .app-card{
    padding:16px;
    border-radius:18px;
  }

  .question,
  .outcome{
    min-height:44px;
  }

  .asset-chip{min-height:42px}
  .primary{min-height:50px}

  .foot{
    padding:10px 18px 16px;
    font-size:.82rem;
  }
}

@media(max-width:380px){
  .topbar{padding-inline:14px}
  .ghost{padding-inline:11px}
  h1{font-size:2.64rem}
  .sub{font-size:.96rem}
  .app-card{padding:14px}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Polymarket</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Polymarket</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Polymarket &mdash; 2026</footer>
</body>
</html>
